<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギャンブル王 - ダイス</title>
    <link rel="stylesheet" href="/css/dice.css">
</head>
<body>
    <button class="btn-back" onclick="goBack()">← ロビーへ戻る</button>

    <div class="container">
        <div class="money-box">軍資金: <span id="diceMoneyText">$ 0.00</span></div>
        
        <h1 class="game-title">🎲 クレイジー・ダイス 🎲</h1>

        <div id="step-bet" class="game-section">
            <p>いくら賭ける？（桁数 ＝ サイコロの数）</p>
            <input type="number" id="betInput" min="1" placeholder="金額を入力" oninput="handleBetInput()">
            
            <div class="preview-area">
                <p class="dice-count-info">サイコロの数: <span id="diceCount">0</span> 個</p>
                <div id="dicePreviewContainer" class="dice-container"></div>
            </div>

            <button id="btnNext" class="btn btn-action" onclick="proceedToModeSelect()" disabled>ルール選択へ進む</button>
        </div>

        <div id="step-mode" class="game-section" style="display: none;">
            <p>現在の賭け金: <span id="displayBet" style="color: #eab308;">$0</span></p>
            <div class="mode-select-buttons">
                <button id="btnModeEach" class="mode-btn active" onclick="switchMode('each')">🎯 出目を当てる</button>
                <button id="btnModeSum" class="mode-btn" onclick="switchMode('sum')">📊 合計を当てる</button>
            </div>

            <div class="prediction-area">
                <div id="predictEachSection">
                    <p>各サイコロの出目を予想（1〜6）</p>
                    <div id="eachInputsContainer" class="inputs-row"></div>
                    <div class="rate-info">的中時のベース倍率: <span id="rateEach" class="rate">--</span> 倍<br><small style="color: #ffcc00;">※2個以上でぞろ目が出るとさらに倍率が「×ダイス数」になります！</small></div>
                </div>

                <div id="predictSumSection" style="display: none;">
                    <p>サイコロの目の合計を予想</p>
                    <input type="number" id="sumInput" placeholder="合計値を入力">
                    <div class="rate-info">予想範囲: <span id="sumRange">--</span><br>的中時のベース倍率: <span id="rateSum" class="rate">--</span> 倍<br><small style="color: #ffcc00;">※2個以上でぞろ目が出るとさらに倍率が「×ダイス数」になります！</small></div>
                </div>
            </div>

            <button class="btn btn-continue" onclick="startDiceGame()">運命のダイスロール！</button>
        </div>

        <div id="step-roll" class="game-section" style="display: none;">
            <div id="diceArena" class="dice-arena"></div>
            
            <h2 id="resultStatus" class="result-status"></h2>
            <div id="resultMessage" class="result-details"></div>

            <button id="btnRestart" class="btn btn-action" onclick="resetGame()" style="display: none;">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        let myMoney = parseFloat(localStorage.getItem('gk_money')) || 0.0;
        let currentBet = 0;
        let diceCount = 0;
        let gameMode = 'each';

        const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        window.onload = function() {
            updateMoneyDisplay();
        };

        function updateMoneyDisplay() {
            document.getElementById('diceMoneyText').innerText = `$ ${myMoney.toFixed(2)}`;
            localStorage.setItem('gk_money', myMoney);
        }

        function handleBetInput() {
            const input = document.getElementById('betInput');
            let valStr = input.value;
            currentBet = parseInt(valStr) || 0;

            if (currentBet > myMoney) {
                input.style.borderColor = "#ef4444";
                document.getElementById('btnNext').disabled = true;
                return;
            } else {
                input.style.borderColor = "#475569";
            }

            diceCount = currentBet > 0 ? valStr.length : 0;
            document.getElementById('diceCount').innerText = diceCount;

            const container = document.getElementById('dicePreviewContainer');
            container.innerHTML = '';
            for (let i = 0; i < diceCount; i++) {
                const dummyDice = document.createElement('div');
                dummyDice.className = 'dice dummy';
                dummyDice.innerText = '❓';
                container.appendChild(dummyDice);
            }

            document.getElementById('btnNext').disabled = (currentBet <= 0);
        }

        function proceedToModeSelect() {
            document.getElementById('step-bet').style.display = 'none';
            document.getElementById('step-mode').style.display = 'block';
            document.getElementById('displayBet').innerText = `$ ${currentBet}`;
            
            let rateEach = (diceCount === 1) ? 1.1 : Math.pow(diceCount, diceCount);
            document.getElementById('rateEach').innerText = (diceCount === 1) ? rateEach.toFixed(1) : rateEach;

            let rateSum = (diceCount === 1) ? 1.1 : (diceCount * diceCount); 
            document.getElementById('rateSum').innerText = (diceCount === 1) ? rateSum.toFixed(1) : rateSum;
            document.getElementById('sumRange').innerText = `${diceCount} 〜 ${diceCount * 6}`;

            const eachContainer = document.getElementById('eachInputsContainer');
            eachContainer.innerHTML = '';
            for(let i=0; i<diceCount; i++) {
                const input = document.createElement('input');
                input.type = 'number';
                input.className = 'each-dice-input';
                input.min = 1;
                input.max = 6;
                input.value = 1;
                eachContainer.appendChild(input);
            }
        }

        function switchMode(mode) {
            gameMode = mode;
            document.getElementById('btnModeEach').classList.toggle('active', mode === 'each');
            document.getElementById('btnModeSum').classList.toggle('active', mode === 'sum');
            document.getElementById('predictEachSection').style.display = mode === 'each' ? 'block' : 'none';
            document.getElementById('predictSumSection').style.display = mode === 'sum' ? 'block' : 'none';
        }

        function startDiceGame() {
            let playerGuesses = [];
            let playerSumGuess = 0;

            if (gameMode === 'each') {
                const inputs = document.querySelectorAll('.each-dice-input');
                for(let input of inputs) {
                    let v = parseInt(input.value);
                    if (isNaN(v) || v < 1 || v > 6) {
                        alert("出目の予想は1〜6の間で入力してください");
                        return;
                    }
                    playerGuesses.push(v);
                }
            } else {
                playerSumGuess = parseInt(document.getElementById('sumInput').value);
                if (isNaN(playerSumGuess) || playerSumGuess < diceCount || playerSumGuess > (diceCount * 6)) {
                    alert(`合計の予想は ${diceCount} 〜 ${diceCount * 6} の間で入力してください`);
                    return;
                }
            }

            myMoney = Math.round((myMoney - currentBet) * 100) / 100;
            updateMoneyDisplay();

            document.getElementById('step-mode').style.display = 'none';
            document.getElementById('step-roll').style.display = 'block';

            const arena = document.getElementById('diceArena');
            arena.innerHTML = '';
            document.getElementById('resultStatus').innerText = "";
            document.getElementById('resultMessage').innerText = "";
            document.getElementById('btnRestart').style.display = 'none';

            let results = [];
            let totalSum = 0;
            for(let i=0; i<diceCount; i++) {
                let roll = Math.floor(Math.random() * 6) + 1;
                results.push(roll);
                totalSum += roll;
            }

            for(let i=0; i<diceCount; i++) {
                const dice = document.createElement('div');
                dice.className = 'dice rolling';
                dice.innerText = '⚀';
                
                let randomX = (Math.random() * 60 - 30);
                dice.style.setProperty('--target-x', `${randomX}px`);
                dice.style.animationDelay = `${i * 0.15}s`;

                arena.appendChild(dice);

                let intervalCounter = 0;
                let task = setInterval(() => {
                    dice.innerText = diceEmojis[Math.floor(Math.random() * 6)];
                    intervalCounter++;
                    if(intervalCounter > 10) {
                        clearInterval(task);
                        dice.innerText = diceEmojis[results[i] - 1];
                        dice.classList.remove('rolling');
                        dice.classList.add('settled');
                    }
                }, 100);
            }

            setTimeout(() => {
                let isWin = false;
                let baseRate = 1.0;
                let isZorome = false;

                // ★ぞろ目判定（ダイスが2個以上、かつすべて同じ出目かチェック）
                if (diceCount >= 2) {
                    isZorome = results.every(val => val === results[0]);
                }

                // 勝敗およびベース倍率の決定
                if (gameMode === 'each') {
                    isWin = true;
                    for(let i=0; i<diceCount; i++) {
                        if(results[i] !== playerGuesses[i]) {
                            isWin = false;
                            break;
                        }
                    }
                    if(isWin) {
                        baseRate = (diceCount === 1) ? 1.1 : Math.pow(diceCount, diceCount);
                    }
                } else {
                    if (totalSum === playerSumGuess) {
                        isWin = true;
                        baseRate = (diceCount === 1) ? 1.1 : (diceCount * diceCount);
                    }
                }

                const statusText = document.getElementById('resultStatus');
                const detailText = document.getElementById('resultMessage');

                if (isWin) {
                    // ★仕様変更: ぞろ目の場合は「× ダイス数」の追加ボーナスを適用
                    let finalRate = baseRate;
                    let zoromeBonusText = "";
                    
                    if (isZorome) {
                        finalRate = baseRate * diceCount;
                        zoromeBonusText = `<br><span style="color: #ffd700; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.6);">✨ 奇跡のぞろ目ボーナス発動！(×${diceCount}倍) ✨</span>`;
                    }

                    let payout = currentBet * finalRate;
                    myMoney = Math.round((myMoney + payout) * 100) / 100;
                    updateMoneyDisplay();

                    statusText.innerHTML = `<span class="win-text">🎉 的中！大勝利！ 🎉</span>`;
                    detailText.innerHTML = `出目結果: [ ${results.join(', ')} ] (合計: ${totalSum})${zoromeBonusText}<br>見事的中（最終倍率: ${finalRate}倍）！ <strong>+$ ${payout.toFixed(2)}</strong> 獲得！`;
                } else {
                    // プレイヤーが外していても、出目自体がぞろ目だった場合のリグレット演出
                    let ghostZoromeText = isZorome ? `<br><small style="color: #ff3333;">(出目はぞろ目でしたが、予想が外れたため不的中です)</small>` : "";
                    
                    statusText.innerHTML = `<span class="lose-text">💀 不的中... 💀</span>`;
                    detailText.innerHTML = `出目結果: [ ${results.join(', ')} ] (合計: ${totalSum})${ghostZoromeText}<br>運がなかったようだ。$ ${currentBet} 没収。`;
                }

                document.getElementById('btnRestart').style.display = 'inline-block';
            }, diceCount * 150 + 1200);
        }

        function resetGame() {
            document.getElementById('step-roll').style.display = 'none';
            document.getElementById('step-bet').style.display = 'block';
            document.getElementById('betInput').value = '';
            handleBetInput();
        }

        function goBack() {
            window.location.href = '/game/lobby';
        }
    </script>
</body>
</html>
