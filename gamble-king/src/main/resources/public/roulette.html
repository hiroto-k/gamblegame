<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギャンブル王 - ツインルーレット</title>
    <link rel="stylesheet" href="/css/roulette.css">
</head>
<body>
    <button class="btn-back" onclick="goBack()">← ロビーへ戻る</button>

    <div class="container">
        <div class="money-box">軍資金: <span id="rouletteMoneyText">$ 0.00</span></div>
        
        <h1 class="game-title">🎡 ツイン・ルーレット 🎡</h1>

        <div id="step-bet" class="game-section">
            <p>いくら賭ける？（桁数 ＝ 選択できる矢印の数）</p>
            <input type="number" id="betInput" min="1" placeholder="金額を入力" oninput="handleBetInput()">
            
            <div class="arrow-select-area">
                <p class="info-text">選択可能な矢印: <span id="arrowCount">0</span> / <span id="maxArrows">0</span> 本</p>
                <p style="font-size:0.8rem; color:#94a3b8; margin:0;">※下の円周上にあるグレーの矢印をタップして選んでください</p>
            </div>

            <div class="wheel-wrapper-preview">
                <div class="arrow a-0" onclick="clickArrow(0)">⬇️</div>
                <div class="arrow a-1" onclick="clickArrow(1)">🡩</div>
                <div class="arrow a-2" onclick="clickArrow(2)">⬅️</div>
                <div class="arrow a-3" onclick="clickArrow(3)">🡩</div>
                <div class="arrow a-4" onclick="clickArrow(4)">⬆️</div>
                <div class="arrow a-5" onclick="clickArrow(5)">🡩</div>
                <div class="arrow a-6" onclick="clickArrow(6)">➡️</div>
                <div class="arrow a-7" onclick="clickArrow(7)">🡩</div>
                <div class="dummy-wheel">WHEEL</div>
            </div>

            <button id="btnNext" class="btn btn-action" onclick="proceedToPredictSelect()" disabled>予想選択へ進む</button>
        </div>

        <div id="step-predict" class="game-section" style="display: none;">
            <p>現在の賭け金: <span id="displayBet" style="color: #ffd700;">$0</span></p>
            
            <div class="bet-type-buttons">
                <button id="btnTypeNumber" class="type-btn active" onclick="switchBetType('number')">🔢 数字のみ</button>
                <button id="btnTypeColor" class="type-btn" onclick="switchBetType('color')">🎨 色のみ</button>
                <button id="btnTypeBoth" class="type-btn" onclick="switchBetType('both')">🌟 両方</button>
            </div>

            <div class="target-select-area">
                <div id="predictNumberSection">
                    <p>予想する数字を入力 (1 〜 30)</p>
                    <input type="number" id="targetNumberInput" min="1" max="30" value="1">
                    <div class="rate-info-sub">的中時の倍率: 選択した数字倍</div>
                </div>

                <div id="predictColorSection" style="display: none;">
                    <p>予想する色を選択</p>
                    <div class="color-radio-group">
                        <button id="colBtn-red" class="col-choice active" onclick="selectColor('red')">🔴 赤 (3倍)</button>
                        <button id="colBtn-white" class="col-choice" onclick="selectColor('white')">⚪ 白 (3倍)</button>
                        <button id="colBtn-black" class="col-choice" onclick="selectColor('black')">⚫ 黒 (3倍)</button>
                        <button id="colBtn-gold" class="col-choice" onclick="selectColor('gold')">👑 金 (5倍)</button>
                    </div>
                </div>
                
                <div id="bothRateNotice" class="rate-info-sub" style="display: none; color: #ffd700; margin-top: 10px;">
                    ※両方的中の倍率:<br>赤・白・黒 ➔ <strong>5倍</strong> / 金 ➔ <strong>10倍</strong>
                </div>
            </div>

            <button class="btn btn-continue" onclick="startRoulette()">ルーレット起動！</button>
        </div>

        <div id="step-play" class="game-section" style="display: none;">
            <div class="wheel-stage">
                <div id="play-arrow-0" class="play-arrow pa-0">⬇️</div>
                <div id="play-arrow-1" class="play-arrow pa-1">🡩</div>
                <div id="play-arrow-2" class="play-arrow pa-2">⬅️</div>
                <div id="play-arrow-3" class="play-arrow pa-3">🡩</div>
                <div id="play-arrow-4" class="play-arrow pa-4">⬆️</div>
                <div id="play-arrow-5" class="play-arrow pa-5">🡩</div>
                <div id="play-arrow-6" class="play-arrow pa-6">➡️</div>
                <div id="play-arrow-7" class="play-arrow pa-7">🡩</div>

                <div id="outerWheel" class="wheel-outer"></div>
                <div id="innerWheel" class="wheel-inner"></div>
                <div class="wheel-center"></div>
            </div>

            <h2 id="resultStatus" class="result-status"></h2>
            <div id="resultMessage" class="result-details"></div>

            <button id="btnRestart" class="btn btn-action" onclick="resetGame()" style="display: none;">もう一度勝負</button>
        </div>
    </div>

    <script>
        let myMoney = parseFloat(localStorage.getItem('gk_money')) || 0.0;
        let currentBet = 0;
        let allowedArrows = 0;
        let selectedArrows = [];
        let betType = 'number';
        let selectedColorTarget = 'red';

        let outerNumbers = [];
        let innerColors = [];

        window.onload = function() {
            updateMoneyDisplay();
            initRouletteData();
        };

        function updateMoneyDisplay() {
            document.getElementById('rouletteMoneyText').innerText = `$ ${myMoney.toFixed(2)}`;
            localStorage.setItem('gk_money', myMoney);
        }

        function initRouletteData() {
            let nums = [];
            for(let i=1; i<=30; i++) nums.push(i);
            outerNumbers = nums.sort(() => Math.random() - 0.5);

            let cols = [];
            for(let i=0; i<10; i++) cols.push('red');
            for(let i=0; i<10; i++) cols.push('white');
            for(let i=0; i<9; i++) cols.push('black');
            cols.push('gold');
            innerColors = cols.sort(() => Math.random() - 0.5);
        }

        function handleBetInput() {
            const input = document.getElementById('betInput');
            let valStr = input.value;
            currentBet = parseInt(valStr) || 0;

            if (currentBet > myMoney || currentBet <= 0) {
                input.style.borderColor = currentBet > myMoney ? "#ef4444" : "#475569";
                allowedArrows = 0;
                selectedArrows = [];
                updateArrowUI();
                document.getElementById('btnNext').disabled = true;
                return;
            }
            input.style.borderColor = "#475569";

            allowedArrows = Math.min(valStr.length, 8);
            
            if (selectedArrows.length > allowedArrows) {
                selectedArrows = selectedArrows.slice(0, allowedArrows);
            }
            updateArrowUI();
        }

        function clickArrow(idx) {
            if (allowedArrows === 0) return;

            let existIdx = selectedArrows.indexOf(idx);
            if (existIdx > -1) {
                selectedArrows.splice(existIdx, 1);
            } else {
                if (selectedArrows.length < allowedArrows) {
                    selectedArrows.push(idx);
                } else {
                    selectedArrows.shift();
                    selectedArrows.push(idx);
                }
            }
            updateArrowUI();
        }

        function updateArrowUI() {
            document.getElementById('maxArrows').innerText = allowedArrows;
            document.getElementById('arrowCount').innerText = selectedArrows.length;

            for(let i=0; i<8; i++) {
                const arrowEl = document.querySelector(`.arrow.a-${i}`);
                if (selectedArrows.includes(i)) {
                    arrowEl.classList.add('selected');
                } else {
                    arrowEl.classList.remove('selected');
                }
            }

            document.getElementById('btnNext').disabled = (selectedArrows.length !== allowedArrows || allowedArrows === 0);
        }

        function proceedToPredictSelect() {
            document.getElementById('step-bet').style.display = 'none';
            document.getElementById('step-predict').style.display = 'block';
            document.getElementById('displayBet').innerText = `$ ${currentBet}`;
        }

        function switchBetType(type) {
            betType = type;
            document.getElementById('btnTypeNumber').classList.toggle('active', type === 'number');
            document.getElementById('btnTypeColor').classList.toggle('active', type === 'color');
            document.getElementById('btnTypeBoth').classList.toggle('active', type === 'both');

            document.getElementById('predictNumberSection').style.display = (type === 'number' || type === 'both') ? 'block' : 'none';
            document.getElementById('predictColorSection').style.display = (type === 'color' || type === 'both') ? 'block' : 'none';
            document.getElementById('bothRateNotice').style.display = (type === 'both') ? 'block' : 'none';
        }

        function selectColor(color) {
            selectedColorTarget = color;
            const colors = ['red', 'white', 'black', 'gold'];
            colors.forEach(c => {
                document.getElementById(`colBtn-${c}`).classList.toggle('active', c === color);
            });
        }

        function startRoulette() {
            let targetNum = parseInt(document.getElementById('targetNumberInput').value) || 0;
            if ((betType === 'number' || betType === 'both') && (targetNum < 1 || targetNum > 30)) {
                alert("数字は1〜30の間で入力してください");
                return;
            }

            myMoney = Math.round((myMoney - currentBet) * 100) / 100;
            updateMoneyDisplay();

            document.getElementById('step-predict').style.display = 'none';
            document.getElementById('step-play').style.display = 'block';

            for(let i=0; i<8; i++) {
                const playArrow = document.getElementById(`play-arrow-${i}`);
                if (selectedArrows.includes(i)) {
                    playArrow.classList.add('active');
                } else {
                    playArrow.classList.remove('active');
                }
            }

            const outer = document.getElementById('outerWheel');
            const inner = document.getElementById('innerWheel');
            outer.innerHTML = '';
            inner.innerHTML = '';

            for(let i=0; i<30; i++) {
                let oSlice = document.createElement('div');
                oSlice.className = 'slice-outer';
                oSlice.style.transform = `rotate(${i * 12}deg)`;
                oSlice.innerHTML = `<span>${outerNumbers[i]}</span>`;
                outer.appendChild(oSlice);

                let iSlice = document.createElement('div');
                iSlice.className = `slice-inner bg-${innerColors[i]}`;
                iSlice.style.transform = `rotate(${i * 12}deg)`;
                inner.appendChild(iSlice);
            }

            outer.className = "wheel-outer spinning-cw";
            inner.className = "wheel-inner spinning-ccw";

            document.getElementById('resultStatus').innerText = "";
            document.getElementById('resultMessage').innerText = "";
            document.getElementById('btnRestart').style.display = 'none';

            setTimeout(() => {
                outer.className = "wheel-outer stopped";
                inner.className = "wheel-inner stopped";

                let baseOffsetOuter = Math.floor(Math.random() * 30);
                let baseOffsetInner = Math.floor(Math.random() * 30);

                let arrowAngles = [0, 4, 7, 11, 15, 19, 22, 26];

                let hitDetails = [];
                let totalPayout = 0;

                selectedArrows.forEach(arrowIdx => {
                    let oIdx = (baseOffsetOuter + arrowAngles[arrowIdx]) % 30;
                    let iIdx = (baseOffsetInner - arrowAngles[arrowIdx] + 30) % 30;

                    let winNum = outerNumbers[oIdx];
                    let winColor = innerColors[iIdx];

                    let isNumMatch = (winNum === targetNum);
                    let isColorMatch = (winColor === selectedColorTarget);

                    let payoutMultiplier = 0;

                    // ★仕様変更: 新しい配当計算ロジック
                    if (betType === 'number' && isNumMatch) {
                        payoutMultiplier = targetNum;
                    } 
                    else if (betType === 'color' && isColorMatch) {
                        // 色のみ選択: 赤、白、黒は3倍、金は5倍
                        if (winColor === 'gold') {
                            payoutMultiplier = 5.0;
                        } else {
                            payoutMultiplier = 3.0;
                        }
                    } 
                    else if (betType === 'both' && isNumMatch && isColorMatch) {
                        // 両方選択: 赤、白、黒は5倍、金は10倍
                        if (winColor === 'gold') {
                            payoutMultiplier = 10.0;
                        } else {
                            payoutMultiplier = 5.0;
                        }
                    }

                    if (payoutMultiplier > 0) {
                        let winAmount = currentBet * payoutMultiplier;
                        totalPayout += winAmount;
                        hitDetails.push(`矢印${arrowIdx+1}: [${winNum} / ${getColorEmoji(winColor)}] 🎯 的中！(+$${winAmount})`);
                    } else {
                        hitDetails.push(`矢印${arrowIdx+1}: [${winNum} / ${getColorEmoji(winColor)}] 不的中`);
                    }
                });

                const statusText = document.getElementById('resultStatus');
                const detailText = document.getElementById('resultMessage');

                if (totalPayout > 0) {
                    myMoney = Math.round((myMoney + totalPayout) * 100) / 100;
                    updateMoneyDisplay();
                    statusText.innerHTML = `<span class="win-text">🎉 的中！払い戻し発生！ 🎉</span>`;
                } else {
                    statusText.innerHTML = `<span class="lose-text">💀 全矢印、不的中... 💀</span>`;
                }

                detailText.innerHTML = hitDetails.join('<br>') + (totalPayout > 0 ? `<br><br><strong style="color:#22c55e; font-size:1.2rem;">トータル払い戻し: +$ ${totalPayout.toFixed(2)}</strong>` : `<br><br>賭け金 $ ${currentBet} は没収されました。`);
                document.getElementById('btnRestart').style.display = 'inline-block';

            }, 3500);
        }

        function getColorEmoji(color) {
            if(color==='red') return '🔴赤';
            if(color==='white') return '⚪白';
            if(color==='black') return '⚫黒';
            return '👑金';
        }

        function resetGame() {
            document.getElementById('step-play').style.display = 'none';
            document.getElementById('step-bet').style.display = 'block';
            document.getElementById('betInput').value = '';
            initRouletteData();
            handleBetInput();
        }

        function goBack() {
            window.location.href = '/game/lobby';
        }
    </script>
</body>
</html>
